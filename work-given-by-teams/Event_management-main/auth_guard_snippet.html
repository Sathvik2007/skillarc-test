<!-- ══════════════════════════════════════════════════════════
     AUTH GUARD SNIPPET — Add this to EVERY protected page
     Place it at the TOP of your <head> section
     ══════════════════════════════════════════════════════════ -->

<!-- Step 1: Include the auth utility -->
<script src="auth.js"></script>

<!-- Step 2: Require authentication — redirects to login.html if not logged in -->
<script>
  if (window.JainAuth) { window.JainAuth.requireAuth(); }
</script>

<!-- ══════════════════════════════════════════════════════════
     OPTIONAL: Add logout button to your navbar
     Place this HTML wherever you want a logout button
     ══════════════════════════════════════════════════════════ -->

<!--
  Option A — Simple logout link:
  <a href="#" onclick="event.preventDefault(); window.JainAuth && window.JainAuth.logout();">
    Sign Out
  </a>

  Option B — Logout button:
  <button onclick="window.JainAuth && window.JainAuth.logout();">
    Sign Out
  </button>
-->

<!-- ══════════════════════════════════════════════════════════
     OPTIONAL: Populate navbar with logged-in user info
     Add IDs to your navbar elements, then call this in
     your DOMContentLoaded handler
     ══════════════════════════════════════════════════════════

  HTML elements with these IDs will be auto-populated:
    id="navUserName"     → user's display name
    id="navUserRole"     → user's role (Student / Staff)
    id="navUserEmail"    → user's email
    id="navUserInitials" → 2-letter initials for avatar

  JS call (inside DOMContentLoaded):
    if (window.JainAuth) { window.JainAuth.populateNavbar(); }
-->
